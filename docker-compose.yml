services:
  toolchain:
    build:
      context: .
      dockerfile: docker/Dockerfile.toolchain
    volumes:
      - ./workspace:/app/workspace
      - ./tools:/app/tools
      - ./scripts:/app/scripts
      - ./docs:/app/docs
      - ./state:/app/state
      - ./upstream:/app/upstream:ro
      - node_modules:/app/workspace/node_modules
    environment:
      - UPSTREAM_DIR=/app/upstream/midnight-wallet
      - MIDNIGHT_NODE_URL=ws://node:9944
      - MIDNIGHT_INDEXER_URL=http://indexer:8088/api/v1/graphql
      - MIDNIGHT_INDEXER_WS_URL=ws://indexer:8088/api/v1/graphql/ws
      - MIDNIGHT_PROOF_SERVER_URL=http://proof-server:6300
    working_dir: /app/workspace
    depends_on:
      node:
        condition: service_healthy
      indexer:
        condition: service_healthy
      proof-server:
        condition: service_started

  toolchain-standalone:
    build:
      context: .
      dockerfile: docker/Dockerfile.toolchain
    volumes:
      - ./workspace:/app/workspace
      - ./tools:/app/tools
      - ./scripts:/app/scripts
      - ./docs:/app/docs
      - ./state:/app/state
      - ./upstream:/app/upstream:ro
      - node_modules:/app/workspace/node_modules
    environment:
      - UPSTREAM_DIR=/app/upstream/midnight-wallet
    working_dir: /app/workspace
    profiles:
      - standalone

  node:
    image: midnightntwrk/midnight-node:0.22.0-rc.6
    command: >
      --dev --rpc-external --rpc-cors=all
      --rpc-methods=unsafe --tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 5s
      timeout: 3s
      retries: 30

  indexer:
    image: midnightntwrk/indexer-standalone:4.0.0-rc.5
    environment:
      - INDEXER_NODE_WS_URL=ws://node:9944
    depends_on:
      node:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/v1/graphql"]
      interval: 5s
      timeout: 3s
      retries: 30

  proof-server:
    image: midnightntwrk/proof-server:8.0.2
    environment:
      - PROOF_SERVER_PORT=6300

volumes:
  node_modules:
