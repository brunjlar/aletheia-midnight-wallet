services:
  toolchain:
    build:
      context: .
      dockerfile: docker/Dockerfile.toolchain
    volumes:
      - ./workspace:/app/workspace
      - ./tools:/app/tools
      - ./scripts:/app/scripts
      - ./docs:/app/docs
      - ./state:/app/state
      - ./upstream:/app/upstream:ro
      - node_modules:/app/workspace/node_modules
    environment:
      - UPSTREAM_DIR=/app/upstream/midnight-wallet
      - MIDNIGHT_NODE_URL=ws://node:9944
      - MIDNIGHT_INDEXER_URL=http://indexer:8088/api/v1/graphql
      - MIDNIGHT_INDEXER_WS_URL=ws://indexer:8088/api/v1/graphql/ws
      - MIDNIGHT_PROOF_SERVER_URL=http://proof-server:6300
    working_dir: /app/workspace
    depends_on:
      node:
        condition: service_healthy
      indexer:
        condition: service_healthy
      proof-server:
        condition: service_started

  toolchain-standalone:
    build:
      context: .
      dockerfile: docker/Dockerfile.toolchain
    volumes:
      - ./workspace:/app/workspace
      - ./tools:/app/tools
      - ./scripts:/app/scripts
      - ./docs:/app/docs
      - ./state:/app/state
      - ./upstream:/app/upstream:ro
      - node_modules:/app/workspace/node_modules
      - puppeteer_cache:/root/.cache/puppeteer
    environment:
      - UPSTREAM_DIR=/app/upstream/midnight-wallet
    working_dir: /app/workspace
    profiles:
      - standalone

  node:
    image: midnightntwrk/midnight-node:0.21.0
    volumes:
      - node-data:/data
    environment:
      CFG_PRESET: dev
      SIDECHAIN_BLOCK_BENEFICIARY: '04bcf7ad3be7a5c790460be82a713af570f22e0f801f6659ab8e84a52be6969e'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  indexer:
    image: midnightntwrk/indexer-standalone:3.1.0
    volumes:
      - ./docker/indexer-config.yaml:/opt/indexer-standalone/config.yaml:ro
    depends_on:
      node:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/status"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  proof-server:
    image: midnightntwrk/proof-server:8.0.2
    environment:
      - PROOF_SERVER_PORT=6300

volumes:
  node_modules:
  node-data:
  puppeteer_cache:
